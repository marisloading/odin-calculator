<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- RELATIONS -->
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Sniglet:wght@400;800&display=swap");
    </style>

    <link rel="stylesheet" href="styles.css" />
    <script
      src="https://kit.fontawesome.com/3a08fce0da.js"
      crossorigin="anonymous"
    ></script>
    <!-- HTML -->
    <title>Odin Calculator</title>
  </head>
  <body class="animated-gradient">
    <div id="calculator">
      <h1>
        <i class="fa-regular fa-heart"></i> My Calculator!
        <i class="fa-regular fa-heart"> </i>
      </h1>
      <span id="display-area">Display here</span>
      <div id="buttons-area">
        <div id="number-buttons">
          <button id="one" value="1">1</button>
          <button id="two" value="2">2</button>
          <button id="three" value="3">3</button>
          <button id="four" value="4">4</button>
          <button id="five" value="5">5</button>
          <button id="six" value="6">6</button>
          <button id="seven" value="7">7</button>
          <button id="eight" value="8">8</button>
          <button id="nine" value="9">9</button>
          <button id="zero" value="0">0</button>
        </div>
        <div id="operator-buttons">
          <button id="plus">+</button>
          <button id="minus">-</button>
          <button id="mult">*</button>
          <button id="slash">/</button>
          <button id="equals">=</button>
        </div>
        <div id="extra-buttons">
          <button id="clear">C</button>
          <button id="dot" value=".">.</button>
          <button id="del"><i class="fa-solid fa-delete-left"></i></button>
        </div>
      </div>
    </div>
  </body>
  <script src="script.js"></script>
</html>
